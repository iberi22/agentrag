version: '3.8'

services:
  # Cortex Memory Server
  cortex:
    build:
      context: .
      dockerfile: Dockerfile
    image: iberi22/cortex:latest
    container_name: cortex
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - CORTEX_PORT=8003
      - CORTEX_HOST=0.0.0.0
      - CORTEX_DB_PATH=/data/cortex.db
      - CORTEX_TOKEN=${CORTEX_TOKEN:-dev-token}
      - RUST_LOG=${RUST_LOG:-info}
      - SURREALDB_URL=ws://surrealdb:8000
      - SURREALDB_USER=${SURREALDB_USER:-root}
      - SURREALDB_PASS=${SURREALDB_PASS:-root}
    volumes:
      - cortex_data:/data
      - cortex_logs:/logs
    depends_on:
      surrealdb:
        condition: service_healthy
    networks:
      - cortex_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "cortex.version=0.2.0"
      - "cortex.service=memory"

  # SurrealDB Database
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: surrealdb
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      - SURREALDB_USER=${SURREALDB_USER:-root}
      - SURREALDB_PASS=${SURREALDB_PASS:-root}
      - SURREALDB_PATH=/data/surreal
    volumes:
      - surreal_data:/data
    networks:
      - cortex_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "surrealdb.version=latest"

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - cortex_network
    profiles:
      - monitoring

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - cortex_network
    profiles:
      - monitoring
    depends_on:
      - prometheus

networks:
  cortex_network:
    driver: bridge
    name: cortex_network

volumes:
  cortex_data:
    name: cortex_data
  cortex_logs:
    name: cortex_logs
  surreal_data:
    name: surreal_data
  prometheus_data:
    name: prometheus_data
  grafana_data:
    name: grafana_data
