name: Project Heartbeat

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to check'
        required: false
        default: ''

jobs:
  heartbeat:
    name: Project Heartbeat
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Analyze Issues
        id: issues
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;
            
            // Get ALL issues (open and closed)
            const allIssues = await github.rest.issues.listForRepo({
              owner: repo.owner,
              repo: repo.repo,
              state: 'all',
              per_page: 50
            });
            
            const openIssues = allIssues.data.filter(i => i.state === 'OPEN');
            const closedIssues = allIssues.data.filter(i => i.state === 'CLOSED');
            
            // Analyze by labels
            const aiPlanIssues = openIssues.filter(i => 
              i.labels.some(l => l.name === 'ai-plan')
            );
            const julesIssues = openIssues.filter(i => 
              i.labels.some(l => l.name === 'jules')
            );
            const enhancementIssues = openIssues.filter(i => 
              i.labels.some(l => l.name === 'enhancement')
            );
            const bugIssues = openIssues.filter(i => 
              i.labels.some(l => l.name === 'bug')
            );
            
            // Find stale issues (>7 days no activity)
            const staleIssues = openIssues.filter(issue => {
              const updated = new Date(issue.updated_at);
              const daysOld = (Date.now() - updated.getTime()) / (1000 * 60 * 60 * 24);
              return daysOld > 7;
            });
            
            // Analyze closed - should they be reopened or deleted?
            const oldClosed = closedIssues.filter(issue => {
              const closed = new Date(issue.closed_at);
              const daysSinceClosed = (Date.now() - closed.getTime()) / (1000 * 60 * 60 * 24);
              return daysSinceClosed > 30;
            });
            
            console.log(`📊 Total Issues: ${allIssues.data.length}`);
            console.log(`   Open: ${openIssues.length}`);
            console.log(`   Closed: ${closedIssues.length}`);
            console.log(`   AI-Plan: ${aiPlanIssues.length}`);
            console.log(`   Jules: ${julesIssues.length}`);
            console.log(`   Stale: ${staleIssues.length}`);
            console.log(`   Old Closed (>30d): ${oldClosed.length}`);
            
            core.setOutput('total_issues', allIssues.data.length);
            core.setOutput('open_issues', openIssues.length);
            core.setOutput('ai_plan_issues', aiPlanIssues.length);
            core.setOutput('jules_issues', julesIssues.length);
            core.setOutput('stale_issues', staleIssues.length);
            core.setOutput('old_closed_issues', oldClosed.length);
            
            // Return detailed info for report
            return {
              open: openIssues.length,
              closed: closedIssues.length,
              aiPlan: aiPlanIssues.length,
              jules: julesIssues.length,
              stale: staleIssues.length,
              oldClosed: oldClosed.length,
              staleList: staleIssues.map(i => `#${i.number}: ${i.title}`),
              oldClosedList: oldClosed.slice(0, 5).map(i => `#${i.number}: ${i.title}`)
            };

      - name: Analyze PRs
        id: prs
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;
            
            // Get all PRs
            const allPRs = await github.rest.pulls.list({
              owner: repo.owner,
              repo: repo.repo,
              state: 'all',
              per_page: 50
            });
            
            const openPRs = allPRs.data.filter(p => p.state === 'OPEN');
            const mergedPRs = allPRs.data.filter(p => p.merged_at !== null);
            const closedPRs = allPRs.data.filter(p => p.state === 'CLOSED' && p.merged_at === null);
            
            // Find stale PRs (>7 days no activity)
            const stalePRs = openPRs.filter(pr => {
              const updated = new Date(pr.updated_at);
              const daysOld = (Date.now() - updated.getTime()) / (1000 * 60 * 60 * 24);
              return daysOld > 7;
            });
            
            // Dependency updates (usually can be closed)
            const depPRs = openPRs.filter(pr => 
              pr.labels.some(l => l.name === 'dependencies') ||
              pr.title.includes('deps:') ||
              pr.title.includes('bump')
            );
            
            console.log(`📝 Total PRs: ${allPRs.data.length}`);
            console.log(`   Open: ${openPRs.length}`);
            console.log(`   Merged: ${mergedPRs.length}`);
            console.log(`   Closed (not merged): ${closedPRs.length}`);
            console.log(`   Stale: ${stalePRs.length}`);
            console.log(`   Dependency updates: ${depPRs.length}`);
            
            core.setOutput('total_prs', allPRs.data.length);
            core.setOutput('open_prs', openPRs.length);
            core.setOutput('merged_prs', mergedPRs.length);
            core.setOutput('stale_prs', stalePRs.length);
            core.setOutput('dep_prs', depPRs.length);
            
            return {
              open: openPRs.length,
              merged: mergedPRs.length,
              stale: stalePRs.length,
              dependencies: depPRs.length,
              staleList: stalePRs.map(p => `#${p.number}: ${p.title}`),
              depList: depPRs.map(p => `#${p.number}: ${p.title}`)
            };

      - name: Check Running Workflows
        id: workflows
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;
            
            const runs = await github.rest.actions.listRunsForRepo({
              owner: repo.owner,
              repo: repo.repo,
              per_page: 10
            });
            
            const inProgress = runs.data.workflow_runs.filter(r => r.status === 'in_progress');
            const failed = runs.data.workflow_runs.filter(r => r.conclusion === 'failure');
            const success = runs.data.workflow_runs.filter(r => r.conclusion === 'success');
            
            core.setOutput('running_workflows', inProgress.length);
            core.setOutput('failed_workflows', failed.length);
            core.setOutput('success_workflows', success.length);
            
            return {
              running: inProgress.length,
              failed: failed.length,
              success: success.length,
              failedList: failed.slice(0, 3).map(r => `${r.name}: ${r.conclusion}`)
            };

      - name: Generate Report
        id: report
        run: |
          OPEN_ISSUES=${{ steps.issues.outputs.open_issues }}
          AI_PLAN=${{ steps.issues.outputs.ai_plan_issues }}
          JULES=${{ steps.issues.outputs.jules_issues }}
          STALE_ISSUES=${{ steps.issues.outputs.stale_issues }}
          OLD_CLOSED=${{ steps.issues.outputs.old_closed_issues }}
          
          OPEN_PRS=${{ steps.prs.outputs.open_prs }}
          DEP_PRS=${{ steps.prs.outputs.dep_prs }}
          STALE_PRS=${{ steps.prs.outputs.stale_prs }}
          
          FAILED_WF=${{ steps.workflows.outputs.failed_workflows }}
          
          echo "## 📊 Project Heartbeat - $(date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🔴 Requiere Atención" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$STALE_ISSUES" -gt "0" ]; then
            echo "⚠️ **$STALE_ISSUES issues stale** (>7 días sin actividad)" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "$STALE_PRS" -gt "0" ]; then
            echo "⚠️ **$STALE_PRS PRs stale** (>7 días sin actividad)" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "$FAILED_WF" -gt "0" ]; then
            echo "❌ **$FAILED_WF workflows fallidos**" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Resumen" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tipo | Cantidad |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Issues Abiertos | $OPEN_ISSUES |" >> $GITHUB_STEP_SUMMARY
          echo "| PRs Abiertos | $OPEN_PRS |" >> $GITHUB_STEP_SUMMARY
          echo "| AI-Plan Issues | $AI_PLAN |" >> $GITHUB_STEP_SUMMARY
          echo "| Jules Issues | $JULES |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencias PRs | $DEP_PRS |" >> $GITHUB_STEP_SUMMARY
          echo "| Old Closed Issues | $OLD_CLOSED |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Acciones Recomendadas" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$DEP_PRS" -gt "0" ]; then
            echo "- **Dependencias ($DEP_PRS):** Revisar y cerrar/merger PRs de dependencias" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "$OLD_CLOSED" -gt "0" ]; then
            echo "- **Issues antiguos ($OLD_CLOSED):** Revisar si eliminar o mantener" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "$STALE_ISSUES" -gt "0" ]; then
            echo "- **Issues stale:** Revisar y cerrar o reasignar" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "$AI_PLAN" -gt "0" ]; then
            echo "- **AI-Plan:** Priorizar implementación de roadmap" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Generado automáticamente cada 15 minutos*">> $GITHUB_STEP_SUMMARY

      - name: Create Action Items Issue (if needed)
        if: steps.issues.outputs.stale_issues > 3 || steps.prs.outputs.dep_prs > 5
        uses: actions/github-script@v7
        with:
          script: |
            const staleIssues = ${{ steps.issues.outputs.stale_issues }};
            const depPRs = ${{ steps.prs.outputs.dep_prs }};
            const oldClosed = ${{ steps.issues.outputs.old_closed_issues }};
            
            let body = `## Resumen de Limpieza\n\n`;
            body += `- Issues stale: ${staleIssues}\n`;
            body += `- PRs de dependencias: ${depPRs}\n`;
            body += `- Issues cerrados antiguos: ${oldClosed}\n\n`;
            body += `### Acciones recomendadas:\n`;
            
            if (depPRs > 5) {
              body += `- Cerrar/merger PRs de dependencias antiguos\n`;
            }
            
            if (staleIssues > 3) {
              body += `- Revisar y cerrar issues sin actividad\n`;
            }
            
            body += `\n_Generado automáticamente por heartbeat_`;
            
            // Create issue
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🧹 Limpieza de proyecto: ${staleIssues} stale + ${depPRs} deps`,
              body: body,
              labels: ['cleanup', 'maintenance']
            });
