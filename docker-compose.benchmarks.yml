services:
  cortex-benchmark:
    build:
      context: .
      dockerfile: Dockerfile
    image: cortex-benchmark:latest
    container_name: cortex-benchmark
    environment:
      - CORTEX_DEV_MODE=1
      - RUST_LOG=info
    ports:
      - "${CORTEX_BENCHMARK_PORT:-8003}:8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  locomo-benchmark:
    build:
      context: .
      dockerfile: docker/benchmark-runner.Dockerfile
    image: cortex-benchmark-runner:latest
    container_name: locomo-benchmark
    depends_on:
      cortex-benchmark:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./benchmark-results:/workspace/benchmark-results
    environment:
      - PYTHONUNBUFFERED=1
    command:
      - python
      - scripts/benchmarks/run_locomo_benchmark.py
      - --base-url
      - http://cortex-benchmark:8003
      - --output-dir
      - /workspace/benchmark-results/locomo-docker
      - --sample-limit
      - "10"
      - --question-limit
      - "5"
      - --use-existing-server

  swebench-benchmark:
    build:
      context: .
      dockerfile: docker/benchmark-runner.Dockerfile
    image: cortex-benchmark-runner:latest
    container_name: swebench-benchmark
    profiles: ["swebench"]
    working_dir: /workspace
    volumes:
      - ./benchmark-results:/workspace/benchmark-results
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
    command:
      - python
      - scripts/benchmarks/run_swebench_eval.py
      - --dataset-name
      - princeton-nlp/SWE-bench_Lite
      - --predictions-path
      - gold
      - --max-workers
      - "1"
      - --output-dir
      - /workspace/benchmark-results/swebench-docker
